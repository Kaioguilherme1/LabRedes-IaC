name: wrnp-lab
topology:
    nodes:
        graphite:
            kind: linux
            image: netreplica/graphite:latest
            env:
                HOST_CONNECTION: ${SSH_CONNECTION}
            binds:
                - __clabDir__/topology-data.json:/htdocs/default/default.json:ro
                - __clabDir__/ansible-inventory.yml:/htdocs/lab/default/ansible-inventory.yml:ro
            ports:
                - 8080:80
            exec:
                - sh -c 'graphite_motd.sh 8080'
            labels:
                graph-hide: yes

        BA:
            kind: juniper_vjunosrouter
            image: vrnetlab/vr-vjunosrouter:23.2R1.15
            startup-config: BA.config
            labels:
                graph-icon: core
                graph-level: 10
                role: Core
                group: PoP-BA
                platform: junos
                vendor: Juniper
                model: MX

        ES:
            kind: juniper_vjunosrouter
            image: vrnetlab/vr-vjunosrouter:23.2R1.15
            startup-config: ES.config
            labels:
                graph-icon: core
                graph-level: 10
                role: Core
                group: PoP-ES
                platform: junos
                vendor: Juniper
                model: MX

        MG:
            kind: juniper_vjunosrouter
            image: vrnetlab/vr-vjunosrouter:23.2R1.15
            startup-config: MG.config
            labels:
                graph-icon: core
                graph-level: 10
                role: Core
                group: PoP-MG
                platform: junos
                vendor: Juniper
                model: MX

                
        client1:
            kind: linux
            image: ghcr.io/srl-labs/network-multitool
            exec:
                - ip address add 192.168.1.2/24 dev eth1
                - ip route add 192.168.2.0/24 via 192.168.1.1 dev eth1
            binds:
                - client1:/config
            group: server
                  
        client2:
            kind: linux
            image: ghcr.io/srl-labs/network-multitool
            exec:
                - ip address add 192.168.2.2/24 dev eth1
                - ip route add 192.168.1.0/24 via 192.168.2.1 dev eth1
                - iperf3 -s -p 5102 -D > iperf3_1.log
            group: server

        br-lab:
            kind: bridge

    links:
        - endpoints: ["BA:eth2", "ES:eth1"]
        - endpoints: ["MG:eth1", "ES:eth2"]
        - endpoints: ["MG:eth2", "BA:eth7"]
        - endpoints: ["BA:eth4", "ES:eth4"]
        - endpoints: ["client2:eth1", "ES:eth9"]
        - endpoints: ["client1:eth1", "MG:eth9"]
        - endpoints: ["MG:eth10", "br-lab:eth10"]
        - endpoints: ["BA:eth10", "br-lab:eth11"]
        - endpoints: ["ES:eth10", "br-lab:eth12"]
